server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # 🔥 THIS PART CONNECTS FRONTEND TO BACKEND
  location /functions/ {
    proxy_pass http://sqli2-backend-1:4000/functions/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
